<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lern-Apps Chemie und Biologie</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#334155;
    --text:#f1f5f9; --muted:#94a3b8; --accent:#38bdf8; --border:#475569;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.5;
    padding:24px 16px 60px;
  }
  header{max-width:760px; margin:0 auto 28px}
  h1{font-size:1.6rem; margin:0 0 6px}
  .sub{color:var(--muted); font-size:.98rem}
  main{max-width:760px; margin:0 auto; display:grid; gap:16px;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));}
  a.card{
    display:block; text-decoration:none; color:inherit;
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:18px 18px 16px; transition:transform .12s ease, background .12s ease;
  }
  a.card:hover{transform:translateY(-3px); background:var(--card2)}
  .ico{font-size:1.8rem; margin-bottom:8px}
  .t{font-weight:600; font-size:1.1rem; margin-bottom:4px}
  .d{color:var(--muted); font-size:.9rem}
  .tag{display:inline-block; margin-top:10px; font-size:.74rem; letter-spacing:.03em;
    color:var(--accent); border:1px solid var(--accent); border-radius:999px; padding:2px 9px}
  footer{max-width:760px; margin:40px auto 0; color:var(--muted); font-size:.82rem; text-align:center}
</style>
</head>
<body>
  <header>
    <h1>Lern-Apps Chemie und Biologie</h1>
    <div class="sub">Interaktive Materialien zum Ausprobieren. Einfach antippen.</div>
  </header>

  <main>
    <a class="card" href="periodensystem/">
      <div class="ico">&#9883;</div>
      <div class="t">Periodensystem</div>
      <div class="d">Interaktiver Lernpfad durch das Periodensystem der Elemente.</div>
      <span class="tag">Chemie</span>
    </a>
  </main>

  <footer>
    FOS Nürnberg &middot; Diese Seite kannst du nur ansehen, nichts wird verändert.
  </footer>
</body>
</html>
